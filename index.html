<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎡 幸运转盘 - 学习积分抽奖</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .wheel-container {
      position: relative;
      width: 280px;
      height: 280px;
    }
    .wheel-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #facc15, #ec4899, #a855f7);
      filter: blur(8px);
      opacity: 0.8;
    }
    .wheel-border {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #facc15, #ec4899, #a855f7);
    }
    #wheel {
      position: relative;
      border-radius: 50%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .spin-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ef4444, #ec4899);
      color: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.2s;
      z-index: 10;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translate(-50%, -50%) scale(1.1);
    }
    .spin-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) scale(0.95);
    }
    .spin-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      opacity: 0.7;
    }
    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 20px solid #ef4444;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
      z-index: 5;
    }
    .confetti {
      position: fixed;
      width: 10px;
      height: 14px;
      top: -20px;
      animation: fall linear forwards;
      z-index: 100;
    }
    @keyframes fall {
      to {
        transform: translateY(120vh) rotate(720deg);
        opacity: 0;
      }
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      animation: pop 0.3s ease-out;
    }
    .modal-content.large {
      max-width: 380px;
      max-height: 85vh;
      overflow-y: auto;
    }
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: #f3f4f6;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: white;
    }
    .tab-btn:first-child { border-radius: 12px 0 0 12px; }
    .tab-btn:last-child { border-radius: 0 12px 12px 0; }
    input[type="number"], input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
    }
    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.selected { border-color: #1f2937; transform: scale(1.15); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-100 via-purple-100 to-blue-100">
  <!-- 顶部状态栏 -->
  <header class="bg-white/80 backdrop-blur-sm shadow-sm px-4 py-3 sticky top-0 z-40">
    <div class="flex items-center justify-between max-w-md mx-auto">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🎡</span>
        <h1 class="text-lg font-bold bg-gradient-to-r from-pink-500 to-purple-600 bg-clip-text text-transparent">幸运转盘</h1>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-1 bg-amber-100 px-3 py-1.5 rounded-full">
          <span>💰</span>
          <span id="points" class="font-bold text-amber-700">0</span>
        </div>
        <div class="flex items-center gap-1 bg-green-100 px-3 py-1.5 rounded-full">
          <span>🎰</span>
          <span id="chances" class="font-bold text-green-700">3</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main id="mainContent" class="flex-1 flex flex-col items-center justify-center px-4 py-8">
    <div id="no-chance-msg" class="mb-4 bg-amber-100 text-amber-700 px-4 py-2 rounded-full text-sm hidden">
      😅 抽奖次数用完了，点击下方"增加机会"
    </div>

    <!-- 转盘 -->
    <div class="wheel-container">
      <div class="wheel-glow"></div>
      <div class="wheel-border"></div>
      <canvas id="wheel" width="280" height="280"></canvas>
      <div class="pointer"></div>
      <button id="spinBtn" class="spin-btn">抽奖</button>
    </div>

    <!-- 概率说明 -->
    <div id="prize-info" class="mt-5 grid grid-cols-4 gap-2 w-full max-w-xs"></div>

    <!-- 提示 -->
    <div class="mt-6 text-center text-gray-500 text-sm">
      <p>🌟 每天完成学习任务获得抽奖机会</p>
      <p>🎯 积分可以在商城兑换奖励</p>
    </div>

    <!-- 底部按钮 -->
    <div class="mt-6 flex gap-3">
      <button id="shopBtn" class="bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:scale-105 transition-transform">
        🎁 商城
      </button>
      <button id="settingsBtn" class="bg-gradient-to-r from-blue-400 to-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:scale-105 transition-transform">
        ⚙️ 设置
      </button>
    </div>

    <button id="addChanceBtn" class="mt-3 text-gray-500 text-sm hover:text-gray-700">
      ➕ 增加抽奖机会
    </button>
  </main>

  <!-- 中奖弹窗 -->
  <div id="prizeModal" class="modal">
    <div class="modal-content">
      <div class="text-5xl mb-4" id="prizeEmoji">🎉</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">🎊 恭喜中奖！🎊</h2>
      <div id="prizeName" class="text-xl font-bold text-purple-600 mb-2">大奖励</div>
      <div id="prizePoints" class="text-3xl font-extrabold text-gray-800 mb-4">+6 积分</div>
      <p class="text-gray-500 text-sm mb-4">继续努力，每天学习，收获更多积分！</p>
      <button id="closeModal" class="w-full py-3 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold rounded-xl">
        太棒了！✨
      </button>
    </div>
  </div>

  <!-- 商城弹窗 -->
  <div id="shopModal" class="modal">
    <div class="modal-content large">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">🎁 积分商城</h2>
        <button id="closeShop" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
      </div>
      <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white p-3 rounded-xl mb-4">
        <div class="text-sm opacity-90">当前积分</div>
        <div id="shopPoints" class="text-3xl font-bold">0</div>
      </div>
      <div id="shopList" class="space-y-2"></div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsModal" class="modal">
    <div class="modal-content large">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">⚙️ 设置</h2>
        <button id="closeSettings" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
      </div>
      
      <!-- 标签切换 -->
      <div class="flex mb-4">
        <button id="tabPrize" class="tab-btn active" onclick="showSettingsTab('prize')">🎡 抽奖设置</button>
        <button id="tabShop" class="tab-btn" onclick="showSettingsTab('shop')">🎁 商城设置</button>
      </div>
      
      <!-- 抽奖设置 -->
      <div id="prizeSettings">
        <div id="prizeProbWarn" class="mb-3 p-2 rounded-lg text-sm hidden"></div>
        <div id="prizeList" class="space-y-3"></div>
        <button onclick="addPrize()" class="mt-3 w-full py-2 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-pink-400 hover:text-pink-500">
          ➕ 添加奖品
        </button>
        <button onclick="resetPrizes()" class="mt-2 w-full py-2 text-gray-500 text-sm hover:text-gray-700">
          🔄 恢复默认设置
        </button>
      </div>
      
      <!-- 商城设置 -->
      <div id="shopSettings" class="hidden">
        <div id="shopEditList" class="space-y-2 max-h-96 overflow-y-auto"></div>
        <div class="mt-4 space-y-2">
          <p class="text-sm text-gray-500 font-medium">添加新奖励：</p>
          <div class="flex gap-2">
            <select id="newItemTier" class="flex-1 p-2 border rounded-lg">
              <option value="🥉">🥉 青铜档</option>
              <option value="🥈">🥈 白银档</option>
              <option value="🥇">🥇 黄金档</option>
              <option value="💎">💎 钻石档</option>
            </select>
            <button onclick="addShopItem()" class="px-4 py-2 bg-blue-500 text-white rounded-lg">添加</button>
          </div>
        </div>
        <button onclick="resetShopItems()" class="mt-3 w-full py-2 text-gray-500 text-sm hover:text-gray-700">
          🔄 恢复默认商城
        </button>
      </div>
      
      <button onclick="saveAllSettings()" class="mt-4 w-full py-3 bg-gradient-to-r from-green-400 to-green-600 text-white font-bold rounded-xl">
        💾 保存设置
      </button>
    </div>
  </div>

  <script>
    // 默认配置
    const DEFAULT_PRIZES = [
      { id: 'small', name: '小奖励', points: 2, probability: 40, color: '#FF9500', emoji: '🎯' },
      { id: 'medium', name: '中奖励', points: 4, probability: 30, color: '#34C759', emoji: '🌟' },
      { id: 'large', name: '大奖励', points: 6, probability: 20, color: '#AF52DE', emoji: '🎉' },
      { id: 'lucky', name: '幸运大奖', points: 8, probability: 10, color: '#FF3B30', emoji: '💎' }
    ];

    const DEFAULT_SHOP_ITEMS = [
      { name: '抽抽乐一次', points: 5, tier: '🥉' },
      { name: '玩15分钟玩具', points: 8, tier: '🥉' },
      { name: '指定父母一方帮自己收拾书房', points: 10, tier: '🥉' },
      { name: '看20分钟动画片', points: 12, tier: '🥉' },
      { name: '玩20分钟游戏/平板', points: 15, tier: '🥉' },
      { name: '玩一局桌游（三国杀等）', points: 18, tier: '🥉' },
      { name: '获得一本漫画书/故事书', points: 20, tier: '🥉' },
      { name: '吃一次汉堡', points: 25, tier: '🥈' },
      { name: '让父母两人收拾书房和游乐区', points: 30, tier: '🥈' },
      { name: '玩40分钟游戏/平板', points: 35, tier: '🥈' },
      { name: '选择一部电影周末在家看', points: 40, tier: '🥈' },
      { name: '去一次儿童乐园（嗨享小镇）', points: 45, tier: '🥈' },
      { name: '周末玩60分钟游戏', points: 50, tier: '🥈' },
      { name: '选择一次外出就餐餐厅', points: 55, tier: '🥇' },
      { name: '获得一个中等玩具（50元以内）', points: 60, tier: '🥇' },
      { name: '去1次游乐场/电玩城（70币）', points: 70, tier: '🥇' },
      { name: '看一场川剧变脸表演', points: 75, tier: '🥇' },
      { name: '买一个喜欢的蛋糕庆祝', points: 80, tier: '🥇' },
      { name: '周末出游地点由孩子决定', points: 85, tier: '🥇' },
      { name: '去电影院看一场电影', points: 100, tier: '🥇' },
      { name: '获得一个大玩具（100元以内）', points: 120, tier: '💎' },
      { name: '去泡一次温泉', points: 150, tier: '💎' },
      { name: '成都周边一日游', points: 200, tier: '💎' },
      { name: '成都周边二日游，住一晚', points: 300, tier: '💎' }
    ];

    const COLORS = [
      { name: '橙色', value: '#FF9500' },
      { name: '绿色', value: '#34C759' },
      { name: '紫色', value: '#AF52DE' },
      { name: '红色', value: '#FF3B30' },
      { name: '蓝色', value: '#007AFF' },
      { name: '粉色', value: '#FF2D92' },
      { name: '黄色', value: '#FFCC00' },
      { name: '青色', value: '#5AC8FA' }
    ];

    const EMOJIS = ['🎯', '🌟', '🎉', '💎', '🎁', '🏆', '⭐', '🔥', '🍀', '🌈', '👑', '💰', '🎲', '🎪', '🚀'];

    // 状态
    let points = parseInt(localStorage.getItem('points') || '0');
    let chances = parseInt(localStorage.getItem('chances') || '3');
    let isSpinning = false;
    
    // 加载配置
    let prizes = JSON.parse(localStorage.getItem('prizes') || 'null') || JSON.parse(JSON.stringify(DEFAULT_PRIZES));
    let shopItems = JSON.parse(localStorage.getItem('shopItems') || 'null') || JSON.parse(JSON.stringify(DEFAULT_SHOP_ITEMS));
    
    // 编辑用的临时数据
    let editPrizes = [];
    let editShopItems = [];

    // DOM元素
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const pointsEl = document.getElementById('points');
    const chancesEl = document.getElementById('chances');
    const noChanceMsg = document.getElementById('no-chance-msg');
    const prizeInfoEl = document.getElementById('prize-info');

    // 更新显示
    function updateDisplay() {
      pointsEl.textContent = points;
      chancesEl.textContent = chances;
      const shopPointsEl = document.getElementById('shopPoints');
      if (shopPointsEl) shopPointsEl.textContent = points;
      noChanceMsg.classList.toggle('hidden', chances > 0);
      spinBtn.disabled = chances <= 0;
      spinBtn.textContent = chances <= 0 ? '无机会' : '抽奖';
      localStorage.setItem('points', points);
      localStorage.setItem('chances', chances);
    }

    // 绘制转盘
    let currentRotation = 0;
    function drawWheel(rotation = 0) {
      const size = canvas.width;
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size / 2 - 10;

      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.translate(-centerX, -centerY);

      let startAngle = -Math.PI / 2;
      const totalProb = prizes.reduce((s, p) => s + p.probability, 0);

      prizes.forEach(prize => {
        const sliceAngle = (prize.probability / totalProb) * 2 * Math.PI;
        const endAngle = startAngle + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = prize.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();

        const textAngle = startAngle + sliceAngle / 2;
        const textX = centerX + Math.cos(textAngle) * (radius * 0.65);
        const textY = centerY + Math.sin(textAngle) * (radius * 0.65);

        ctx.save();
        ctx.translate(textX, textY);
        ctx.rotate(textAngle + Math.PI / 2);

        ctx.font = '22px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(prize.emoji, 0, -10);

        ctx.font = 'bold 14px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText(prize.points + '分', 0, 14);

        ctx.restore();
        startAngle = endAngle;
      });

      ctx.restore();

      ctx.beginPath();
      ctx.arc(centerX, centerY, 32, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // 初始化概率显示
    function initPrizeInfo() {
      const totalProb = prizes.reduce((s, p) => s + p.probability, 0);
      prizeInfoEl.innerHTML = prizes.map(p => `
        <div class="flex flex-col items-center p-2 rounded-lg bg-white/80 shadow">
          <span class="text-lg">${p.emoji}</span>
          <span class="text-xs font-medium text-gray-700">${p.points}分</span>
          <span class="text-xs text-gray-500">${Math.round(p.probability / totalProb * 100)}%</span>
        </div>
      `).join('');
    }

    // 初始化商城
    function initShop() {
      const shopList = document.getElementById('shopList');
      shopList.innerHTML = shopItems.map(item => {
        const canAfford = points >= item.points;
        return `
          <button 
            onclick="exchange('${item.name.replace(/'/g, "\\'")}', ${item.points})"
            class="w-full p-3 rounded-xl flex items-center justify-between transition-all ${
              canAfford 
                ? 'bg-white shadow hover:shadow-md hover:scale-[1.02] active:scale-[0.98]' 
                : 'bg-gray-100 opacity-60'
            }"
            ${!canAfford ? 'disabled' : ''}
          >
            <div class="flex items-center gap-2">
              <span>${item.tier}</span>
              <span class="text-sm ${canAfford ? 'text-gray-800' : 'text-gray-500'}">${item.name}</span>
            </div>
            <span class="px-3 py-1 rounded-full text-sm font-bold ${
              canAfford ? 'bg-amber-100 text-amber-700' : 'bg-gray-200 text-gray-500'
            }">${item.points}分</span>
          </button>
        `;
      }).join('');
    }

    // 兑换
    function exchange(name, cost) {
      if (points < cost) return;
      points -= cost;
      updateDisplay();
      initShop();
      alert(`🎉 兑换成功！\n\n${name}\n\n找爸爸妈妈兑现奖励吧！`);
    }

    // 开始抽奖
    function spin() {
      if (isSpinning || chances <= 0) return;
      isSpinning = true;
      spinBtn.disabled = true;
      spinBtn.textContent = '旋转中';

      const totalProb = prizes.reduce((s, p) => s + p.probability, 0);
      const random = Math.random() * totalProb;
      let cumulative = 0;
      let selectedPrize = prizes[0];
      let prizeAngle = 0;
      
      for (const prize of prizes) {
        if (random <= cumulative + prize.probability) {
          selectedPrize = prize;
          break;
        }
        prizeAngle += prize.probability;
        cumulative += prize.probability;
      }
      
      prizeAngle += Math.random() * selectedPrize.probability * 0.8 + selectedPrize.probability * 0.1;
      const prizeAngleDeg = (prizeAngle / totalProb) * 360;

      const extraSpins = 5 + Math.floor(Math.random() * 3);
      const targetRotation = extraSpins * 360 + (360 - prizeAngleDeg);
      const duration = 4000;
      const startTime = Date.now();
      const startRotation = currentRotation;

      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 4);
        currentRotation = startRotation + targetRotation * easeOut;
        drawWheel(currentRotation);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          chances--;
          points += selectedPrize.points;
          updateDisplay();
          initShop();
          showPrize(selectedPrize);
        }
      }
      requestAnimationFrame(animate);
    }

    // 显示奖品
    function showPrize(prize) {
      document.getElementById('prizeEmoji').textContent = prize.emoji;
      document.getElementById('prizeName').textContent = prize.name;
      document.getElementById('prizePoints').textContent = '+' + prize.points + ' 积分';
      document.getElementById('prizeModal').classList.add('show');
      createConfetti();
    }

    // 彩带效果
    function createConfetti() {
      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    // === 设置功能 ===
    
    function showSettingsTab(tab) {
      document.getElementById('tabPrize').classList.toggle('active', tab === 'prize');
      document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
      document.getElementById('prizeSettings').classList.toggle('hidden', tab !== 'prize');
      document.getElementById('shopSettings').classList.toggle('hidden', tab !== 'shop');
    }

    function openSettings() {
      editPrizes = JSON.parse(JSON.stringify(prizes));
      editShopItems = JSON.parse(JSON.stringify(shopItems));
      renderPrizeList();
      renderShopEditList();
      document.getElementById('settingsModal').classList.add('show');
    }

    function renderPrizeList() {
      const total = editPrizes.reduce((s, p) => s + p.probability, 0);
      const warnEl = document.getElementById('prizeProbWarn');
      if (total !== 100) {
        warnEl.textContent = `⚠️ 当前总概率: ${total}%（需要等于100%）`;
        warnEl.className = 'mb-3 p-2 rounded-lg text-sm bg-red-100 text-red-700';
        warnEl.classList.remove('hidden');
      } else {
        warnEl.classList.add('hidden');
      }

      const listEl = document.getElementById('prizeList');
      listEl.innerHTML = editPrizes.map((p, i) => `
        <div class="bg-gray-50 p-3 rounded-xl">
          <div class="flex justify-between items-center mb-2">
            <span class="font-bold">${p.emoji} ${p.name}</span>
            ${editPrizes.length > 2 ? `<button onclick="removePrize(${i})" class="text-red-500 text-sm">🗑️</button>` : ''}
          </div>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <div>
              <label class="text-xs text-gray-500">名称</label>
              <input type="text" value="${p.name}" onchange="editPrizes[${i}].name=this.value" class="mt-1">
            </div>
            <div>
              <label class="text-xs text-gray-500">积分</label>
              <input type="number" value="${p.points}" min="1" onchange="editPrizes[${i}].points=parseInt(this.value)||1" class="mt-1">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <div>
              <label class="text-xs text-gray-500">概率(%)</label>
              <input type="number" value="${p.probability}" min="1" max="100" onchange="editPrizes[${i}].probability=parseInt(this.value)||1; renderPrizeList()" class="mt-1">
            </div>
            <div>
              <label class="text-xs text-gray-500">图标</label>
              <div class="flex flex-wrap gap-1 mt-1">
                ${EMOJIS.map(e => `
                  <button onclick="editPrizes[${i}].emoji='${e}'; renderPrizeList()" 
                    class="w-7 h-7 text-lg rounded ${p.emoji === e ? 'bg-pink-200' : 'bg-white'} hover:bg-pink-100">
                    ${e}
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-500">颜色</label>
            <div class="flex flex-wrap gap-2 mt-1">
              ${COLORS.map(c => `
                <button onclick="editPrizes[${i}].color='${c.value}'; renderPrizeList()" 
                  class="color-btn ${p.color === c.value ? 'selected' : ''}" 
                  style="background-color: ${c.value}" title="${c.name}">
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    function addPrize() {
      if (editPrizes.length >= 8) {
        alert('最多只能添加8个奖品！');
        return;
      }
      editPrizes.push({
        id: 'prize-' + Date.now(),
        name: '新奖品',
        points: 1,
        probability: 10,
        color: '#007AFF',
        emoji: '🎁'
      });
      renderPrizeList();
    }

    function removePrize(index) {
      editPrizes.splice(index, 1);
      renderPrizeList();
    }

    function resetPrizes() {
      editPrizes = JSON.parse(JSON.stringify(DEFAULT_PRIZES));
      renderPrizeList();
    }

    function renderShopEditList() {
      const listEl = document.getElementById('shopEditList');
      const tiers = { '🥉': '青铜档', '🥈': '白银档', '🥇': '黄金档', '💎': '钻石档' };
      
      listEl.innerHTML = Object.keys(tiers).map(tier => {
        const items = editShopItems.filter(i => i.tier === tier);
        return `
          <div class="mb-4">
            <div class="font-bold text-gray-700 mb-2">${tier} ${tiers[tier]} (${items.length}项)</div>
            ${items.map((item, idx) => {
              const globalIdx = editShopItems.findIndex(i => i === item);
              return `
                <div class="flex items-center gap-2 mb-2 bg-white p-2 rounded-lg">
                  <input type="text" value="${item.name}" 
                    onchange="editShopItems[${globalIdx}].name=this.value"
                    class="flex-1 text-sm">
                  <input type="number" value="${item.points}" min="1"
                    onchange="editShopItems[${globalIdx}].points=parseInt(this.value)||1"
                    class="w-16 text-sm text-center">
                  <span class="text-xs text-gray-400">分</span>
                  <button onclick="removeShopItem(${globalIdx})" class="text-red-400 hover:text-red-600">✕</button>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function addShopItem() {
      const tier = document.getElementById('newItemTier').value;
      editShopItems.push({
        name: '新奖励',
        points: 10,
        tier: tier
      });
      renderShopEditList();
    }

    function removeShopItem(index) {
      editShopItems.splice(index, 1);
      renderShopEditList();
    }

    function resetShopItems() {
      editShopItems = JSON.parse(JSON.stringify(DEFAULT_SHOP_ITEMS));
      renderShopEditList();
    }

    function saveAllSettings() {
      const total = editPrizes.reduce((s, p) => s + p.probability, 0);
      if (total !== 100) {
        alert('概率总和必须等于100%！当前为' + total + '%');
        return;
      }
      
      prizes = editPrizes;
      shopItems = editShopItems;
      localStorage.setItem('prizes', JSON.stringify(prizes));
      localStorage.setItem('shopItems', JSON.stringify(shopItems));
      
      drawWheel();
      initPrizeInfo();
      initShop();
      document.getElementById('settingsModal').classList.remove('show');
      alert('✅ 设置已保存！');
    }

    // 事件绑定
    spinBtn.addEventListener('click', spin);
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('prizeModal').classList.remove('show');
    });
    document.getElementById('shopBtn').addEventListener('click', () => {
      initShop();
      document.getElementById('shopModal').classList.add('show');
    });
    document.getElementById('closeShop').addEventListener('click', () => {
      document.getElementById('shopModal').classList.remove('show');
    });
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('closeSettings').addEventListener('click', () => {
      document.getElementById('settingsModal').classList.remove('show');
    });
    document.getElementById('addChanceBtn').addEventListener('click', () => {
      chances++;
      updateDisplay();
      alert('✅ 已增加1次抽奖机会！');
    });

    // 初始化
    drawWheel();
    updateDisplay();
    initPrizeInfo();
  </script>
</body>
</html>
